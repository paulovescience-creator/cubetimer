<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cubetimer - grego</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.85em' font-size='70'>🩷</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0d0d0f;
      --surface:   #161619;
      --surface2:  #1e1e23;
      --border:    #2a2a32;
      --pink:      #f472b6;
      --pink-dim:  #9d3f6e;
      --white:     #f8f8f8;
      --muted:     #6b6b7e;
      --green:     #86efac;
      --red:       #f87171;
      --yellow:    #fbbf24;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      color: var(--pink);
      letter-spacing: 0.08em;
    }
    .logo span { color: var(--muted); }
    .logo .heart { color: var(--pink); }
    .header-right { display: flex; align-items: center; gap: 1rem; }

    .cube-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .cube-select:hover { border-color: var(--pink-dim); }
    .cube-select option { background: var(--surface2); }

    /* sync indicator */
    .sync-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .sync-dot.syncing  { background: var(--yellow); }
    .sync-dot.synced   { background: var(--green); }
    .sync-dot.error    { background: var(--red); }

    /* ─── TABS ─── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.75rem 1.2rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn:hover { color: var(--white); }
    .tab-btn.active { color: var(--pink); border-bottom-color: var(--pink); }

    /* ─── MAIN LAYOUT ─── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      height: calc(100vh - 100px);
    }

    /* ─── TIMER AREA ─── */
    .timer-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      border-right: 1px solid var(--border);
      position: relative;
      user-select: none;
    }
    .timer-area::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(244,114,182,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .cube-deco {
      position: absolute;
      bottom: 1.5rem; right: 1.5rem;
      width: 80px; height: 80px;
      object-fit: contain;
      opacity: 0.55;
      pointer-events: none;
      filter: drop-shadow(0 0 12px rgba(244,114,182,0.25));
      transition: opacity 0.3s;
    }
    .cube-deco:hover { opacity: 0.9; }

    .status-hint {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .status-hint.ready  { color: var(--green); }
    .status-hint.set    { color: var(--yellow); }
    .status-hint.timing { color: var(--pink); }

    .timer-display {
      font-family: 'Space Mono', monospace;
      font-size: clamp(4rem, 10vw, 7rem);
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.02em;
      transition: color 0.15s;
      line-height: 1;
    }
    .timer-display.ready  { color: var(--green); }
    .timer-display.set    { color: var(--yellow); }
    .timer-display.timing { color: var(--pink); }
    .timer-ms { font-size: 0.45em; color: var(--muted); vertical-align: baseline; }

    .spacebar-hint { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.08em; }

    /* ─── SIDEBAR ─── */
    .sidebar { display: flex; flex-direction: column; overflow: hidden; }
    .panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .panel.active { display: flex; }

    .sidebar-header {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .sidebar-title { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
    .clear-btn {
      font-size: 0.72rem; color: var(--muted);
      background: none; border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      padding: 0.25rem 0.5rem; border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }
    .clear-btn:hover { color: var(--red); background: rgba(248,113,113,0.08); }

    .times-list { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
    .times-list::-webkit-scrollbar { width: 4px; }
    .times-list::-webkit-scrollbar-track { background: transparent; }
    .times-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .time-entry {
      display: grid;
      grid-template-columns: 28px 1fr auto auto;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.5rem 0.55rem 1rem;
      transition: background 0.15s;
      position: relative;
    }
    .time-entry:hover { background: var(--surface2); }
    .time-entry.is-best .entry-time { color: var(--pink); }
    .time-entry.is-best::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px; background: var(--pink); border-radius: 0 2px 2px 0;
    }
    .entry-num { font-size: 0.72rem; color: var(--muted); font-family: 'Space Mono', monospace; text-align: right; }
    .entry-time { font-family: 'Space Mono', monospace; font-size: 0.92rem; color: var(--white); }
    .entry-cube {
      font-size: 0.68rem; color: var(--muted);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.1rem 0.35rem;
      font-family: 'Space Mono', monospace;
    }
    .entry-del {
      background: none; border: none; color: transparent;
      cursor: pointer; font-size: 0.8rem; padding: 0.2rem 0.3rem;
      border-radius: 4px; transition: color 0.15s, background 0.15s; line-height: 1;
    }
    .time-entry:hover .entry-del { color: var(--muted); }
    .entry-del:hover { color: var(--red) !important; background: rgba(248,113,113,0.1); }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%;
      gap: 0.75rem; color: var(--muted); font-size: 0.85rem;
      padding: 2rem; text-align: center;
    }
    .empty-icon { font-size: 2rem; opacity: 0.4; }

    /* STATS PANEL */
    .stats-panel { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
    .stats-panel::-webkit-scrollbar { width: 4px; }
    .stats-panel::-webkit-scrollbar-track { background: transparent; }
    .stats-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .stats-cube-section { margin-bottom: 1.5rem; }
    .stats-cube-title {
      font-size: 0.72rem; color: var(--pink);
      letter-spacing: 0.12em; text-transform: uppercase;
      font-family: 'Space Mono', monospace;
      margin-bottom: 0.75rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .stats-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem;
      display: flex; flex-direction: column; gap: 0.2rem;
    }
    .stats-card-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .stats-card-value { font-family: 'Space Mono', monospace; font-size: 1rem; color: var(--white); }
    .stats-card-value.pink { color: var(--pink); }
    .stats-card-sub { font-size: 0.68rem; color: var(--muted); }

    /* loading overlay */
    .loading-bar {
      height: 2px;
      background: linear-gradient(90deg, var(--pink), transparent);
      width: 0%;
      transition: width 0.4s;
      position: fixed;
      top: 0; left: 0;
    }

    @media (max-width: 680px) {
      main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; min-height: calc(100vh - 100px); }
      .timer-area { border-right: none; border-bottom: 1px solid var(--border); padding: 3rem 1.5rem; }
      .sidebar { height: 40vh; }
    }
  </style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<header>
  <div class="logo">cube<span>timer</span> <span style="color:var(--pink)">grego</span> <span class="heart">&lt;3</span></div>
  <div class="header-right">
    <div class="sync-dot" id="syncDot" title="estado de sincronización"></div>
    <select class="cube-select" id="cubeType">
      <option value="2x2">2x2</option>
      <option value="3x3">3x3</option>
      <option value="4x4">4x4</option>
      <option value="5x5">5x5</option>
      <option value="tester">tester</option>
    </select>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="tiempos">tiempos</button>
  <button class="tab-btn" data-tab="estadisticas">estadísticas</button>
</div>

<main>
  <section class="timer-area" id="timerArea">
    <div class="status-hint" id="statusHint">mantén espacio presionado para preparar</div>
    <div class="timer-display" id="timerDisplay">0<span class="timer-ms">.000</span></div>
    <div class="spacebar-hint" id="spacebarHint">espacio · toca pantalla en móvil</div>
    <img class="cube-deco" src="cube.png" alt="cubo" onerror="this.style.display='none'" />
  </section>

  <aside class="sidebar">
    <div class="panel active" id="panel-tiempos">
      <div class="sidebar-header">
        <span class="sidebar-title" id="sidebarTitle">tiempos</span>
        <button class="clear-btn" id="clearBtn">limpiar</button>
      </div>
      <div class="times-list" id="timesList"></div>
    </div>
    <div class="panel" id="panel-estadisticas">
      <div class="sidebar-header">
        <span class="sidebar-title">estadísticas por cubo</span>
      </div>
      <div class="stats-panel" id="statsPanel"></div>
    </div>
  </aside>
</main>

<script>
  // ─── SUPABASE CONFIG ───
  const SUPABASE_URL = 'https://pghoroonmmmhhglzyfay.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_6fUkFKHHbK5zgS9yzzhyfQ_yfZV8ndQ';
  const TABLE = 'tiempos';

  async function sbFetch(path, options = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      ...options,
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
        ...(options.headers || {}),
      },
    });
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  // ─── STATE ───
  const state = {
    times: [],
    status: 'idle',
    startTime: 0,
    elapsed: 0,
    holdTimer: null,
    rafId: null,
    activeTab: 'tiempos',
  };

  const HOLD_MS = 550;
  const CUBES = ['2x2','3x3','4x4','5x5','tester'];

  // ─── ELEMENTS ───
  const display      = document.getElementById('timerDisplay');
  const hint         = document.getElementById('statusHint');
  const spHint       = document.getElementById('spacebarHint');
  const timesList    = document.getElementById('timesList');
  const clearBtn     = document.getElementById('clearBtn');
  const sidebarTitle = document.getElementById('sidebarTitle');
  const cubeSelect   = document.getElementById('cubeType');
  const statsPanel   = document.getElementById('statsPanel');
  const syncDot      = document.getElementById('syncDot');
  const loadingBar   = document.getElementById('loadingBar');

  // ─── SYNC UI ───
  function setSyncing() { syncDot.className = 'sync-dot syncing'; }
  function setSynced()  { syncDot.className = 'sync-dot synced'; setTimeout(() => syncDot.className = 'sync-dot', 2000); }
  function setSyncErr() { syncDot.className = 'sync-dot error'; }

  // ─── FORMAT ───
  function fmt(ms) {
    if (ms === null || ms === undefined) return '—';
    if (ms >= 60000) {
      const m = Math.floor(ms / 60000);
      const s = ((ms % 60000) / 1000).toFixed(2).padStart(5, '0');
      return `${m}:${s}`;
    }
    return (ms / 1000).toFixed(3);
  }
  function fmtDisplay(ms) {
    const s = fmt(ms);
    const dot = s.lastIndexOf('.');
    if (dot === -1) return s;
    return `${s.slice(0, dot)}<span class="timer-ms">.${s.slice(dot+1)}</span>`;
  }

  // ─── STATS ───
  function ao(arr, n) {
    if (arr.length < n) return null;
    const slice = arr.slice(-n);
    const sorted = [...slice].sort((a,b) => a-b);
    const trimmed = sorted.slice(1, -1);
    return trimmed.reduce((a,b) => a+b, 0) / trimmed.length;
  }
  function mean(arr) { return arr.length ? arr.reduce((a,b) => a+b, 0) / arr.length : null; }
  function best(arr) { return arr.length ? Math.min(...arr) : null; }

  // ─── LOAD FROM SUPABASE ───
  async function loadTimes() {
    loadingBar.style.width = '60%';
    try {
      const data = await sbFetch(`${TABLE}?order=id.asc&select=id,ms,cube,fecha`);
      state.times = data || [];
      renderList();
      loadingBar.style.width = '100%';
      setTimeout(() => loadingBar.style.width = '0%', 400);
    } catch(e) {
      console.error('Error cargando tiempos:', e);
      setSyncErr();
      loadingBar.style.width = '0%';
      // fallback a localStorage si falla
      state.times = JSON.parse(localStorage.getItem('ct_times_v2') || '[]');
      renderList();
    }
  }

  // ─── SAVE TO SUPABASE ───
  async function saveTime(ms, cube) {
    setSyncing();
    const fecha = new Date().toISOString();
    // optimistic: agregar localmente primero
    state.times.push({ ms, cube, fecha });
    renderList();
    try {
      const [saved] = await sbFetch(TABLE, {
        method: 'POST',
        body: JSON.stringify({ ms, cube, fecha }),
      });
      // reemplazar el último con el que tiene id real
      state.times[state.times.length - 1] = saved;
      setSynced();
    } catch(e) {
      console.error('Error guardando tiempo:', e);
      setSyncErr();
      // guardar en localStorage como backup
      localStorage.setItem('ct_times_v2', JSON.stringify(state.times));
    }
  }

  // ─── DELETE FROM SUPABASE ───
  async function deleteTime(idx) {
    const entry = state.times[idx];
    state.times.splice(idx, 1);
    renderList();
    renderStats();
    if (!entry.id) return; // era local, no tiene id
    setSyncing();
    try {
      await sbFetch(`${TABLE}?id=eq.${entry.id}`, { method: 'DELETE' });
      setSynced();
    } catch(e) {
      console.error('Error eliminando tiempo:', e);
      setSyncErr();
    }
  }

  // ─── RENDER LIST ───
  function renderList() {
    const t = state.times;
    sidebarTitle.textContent = t.length ? `tiempos (${t.length})` : 'tiempos';
    if (!t.length) {
      timesList.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">⏱</span>
          <span>sin tiempos aún<br><small style="color:var(--muted);font-size:0.75rem">mantén espacio presionado para preparar</small></span>
        </div>`;
      return;
    }
    const bestVal = best(t.map(x => x.ms));
    timesList.innerHTML = '';
    [...t].reverse().forEach((entry, i) => {
      const realIdx = t.length - 1 - i;
      const el = document.createElement('div');
      el.className = 'time-entry' + (entry.ms === bestVal ? ' is-best' : '');
      el.innerHTML = `
        <span class="entry-num">${t.length - i}</span>
        <span class="entry-time">${fmt(entry.ms)}</span>
        <span class="entry-cube">${entry.cube}</span>
        <button class="entry-del" data-idx="${realIdx}" title="eliminar">✕</button>
      `;
      timesList.appendChild(el);
    });
    timesList.querySelectorAll('.entry-del').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        deleteTime(parseInt(btn.dataset.idx));
      });
    });
  }

  // ─── RENDER STATS ───
  function renderStats() {
    statsPanel.innerHTML = '';
    if (!state.times.length) {
      statsPanel.innerHTML = `<div class="empty-state"><span class="empty-icon">📊</span><span>sin tiempos aún</span></div>`;
      return;
    }
    CUBES.forEach(cube => {
      const times = state.times.filter(x => x.cube === cube).map(x => x.ms);
      if (!times.length) return;
      const b = best(times), a5 = ao(times,5), a12 = ao(times,12), m = mean(times);
      const section = document.createElement('div');
      section.className = 'stats-cube-section';
      section.innerHTML = `
        <div class="stats-cube-title">${cube} <span style="color:var(--muted);font-weight:400">(${times.length} solve${times.length!==1?'s':''})</span></div>
        <div class="stats-grid">
          <div class="stats-card"><span class="stats-card-label">Mejor</span><span class="stats-card-value pink">${fmt(b)}</span></div>
          <div class="stats-card"><span class="stats-card-label">Media</span><span class="stats-card-value">${fmt(m)}</span></div>
          <div class="stats-card">
            <span class="stats-card-label">Ao5</span>
            <span class="stats-card-value">${a5!==null?fmt(a5):'—'}</span>
            ${a5===null?'<span class="stats-card-sub">necesitás 5 solves</span>':''}
          </div>
          <div class="stats-card">
            <span class="stats-card-label">Ao12</span>
            <span class="stats-card-value">${a12!==null?fmt(a12):'—'}</span>
            ${a12===null?'<span class="stats-card-sub">necesitás 12 solves</span>':''}
          </div>
        </div>`;
      statsPanel.appendChild(section);
    });
  }

  // ─── TABS ───
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      state.activeTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');
      if (tab === 'estadisticas') renderStats();
    });
  });

  // ─── TIMER ───
  function tick() {
    state.elapsed = performance.now() - state.startTime;
    display.innerHTML = fmtDisplay(state.elapsed);
    state.rafId = requestAnimationFrame(tick);
  }
  function setClass(cls) {
    display.className = 'timer-display' + (cls ? ' '+cls : '');
    hint.className    = 'status-hint'   + (cls ? ' '+cls : '');
  }
  function startHolding() {
    if (state.status === 'timing') { stopTimer(); return; }
    if (state.status !== 'idle') return;
    state.status = 'holding';
    setClass('set');
    hint.textContent = 'preparando…';
    state.holdTimer = setTimeout(() => {
      if (state.status === 'holding') {
        state.status = 'ready';
        setClass('ready');
        hint.textContent = 'listo — suelta para iniciar';
      }
    }, HOLD_MS);
  }
  function releaseHolding() {
    if (state.status === 'holding') {
      clearTimeout(state.holdTimer);
      state.status = 'idle';
      setClass('');
      hint.textContent = 'mantén espacio presionado para preparar';
    } else if (state.status === 'ready') {
      startTimer();
    }
  }
  function startTimer() {
    state.status    = 'timing';
    state.startTime = performance.now();
    setClass('timing');
    hint.textContent = 'corriendo…';
    spHint.textContent = 'toca para detener';
    state.rafId = requestAnimationFrame(tick);
  }
  function stopTimer() {
    cancelAnimationFrame(state.rafId);
    state.elapsed = performance.now() - state.startTime;
    const ms   = Math.round(state.elapsed);
    const cube = cubeSelect.value;
    state.status = 'idle';
    display.innerHTML = fmtDisplay(state.elapsed);
    setClass('');
    hint.textContent = 'mantén espacio presionado para preparar';
    spHint.textContent = 'espacio · toca pantalla en móvil';
    saveTime(ms, cube);
    if (state.activeTab === 'estadisticas') renderStats();
  }

  // ─── EVENTS ───
  document.addEventListener('keydown', e => { if (e.code==='Space'&&!e.repeat){e.preventDefault();startHolding();} });
  document.addEventListener('keyup',   e => { if (e.code==='Space'){e.preventDefault();releaseHolding();} });

  const timerArea = document.getElementById('timerArea');
  timerArea.addEventListener('pointerdown', e => { if (!e.target.closest('select,button,img')) startHolding(); });
  timerArea.addEventListener('pointerup',   e => { if (!e.target.closest('select,button,img')) releaseHolding(); });

  // ─── CLEAR ───
  clearBtn.addEventListener('click', async () => {
    if (!state.times.length) return;
    const cube = cubeSelect.value;
    const cubeCount = state.times.filter(x => x.cube === cube).length;
    const todos = cubeCount < state.times.length
      ? confirm(`¿Limpiar solo los tiempos de ${cube} o todos?\n\nOK = todos | Cancelar = solo ${cube}`)
      : confirm(`¿Limpiar todos los tiempos de ${cube}?`);

    setSyncing();
    try {
      if (todos) {
        await sbFetch(`${TABLE}?id=gte.0`, { method: 'DELETE' });
        state.times = [];
      } else {
        const ids = state.times.filter(x => x.cube === cube && x.id).map(x => x.id);
        if (ids.length) await sbFetch(`${TABLE}?id=in.(${ids.join(',')})`, { method: 'DELETE' });
        state.times = state.times.filter(x => x.cube !== cube);
      }
      setSynced();
    } catch(e) {
      console.error('Error limpiando:', e);
      setSyncErr();
    }
    display.innerHTML = '0<span class="timer-ms">.000</span>';
    renderList();
    renderStats();
  });

  // ─── INIT ───
  loadTimes();
</script>
</body>
</html>
